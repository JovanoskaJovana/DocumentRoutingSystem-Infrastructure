version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: routing-system-db
    environment:
      POSTGRES_DB: routingSystemDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d routingSystemDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../DocumentRoutingSystem-Backend
      dockerfile: Dockerfile
    image: routing-system-backend:1.0
    container_name: routing-system-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/routingSystemDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_TIME_MS: ${JWT_EXPIRATION_TIME_MS}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../DocumentRoutingSystem-Frontend
      dockerfile: Dockerfile
    image: routing-system-frontend:1.0
    container_name: routing-system-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: